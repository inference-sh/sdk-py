    ModelResponseProperties:
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        prompt_cache_key:
          description: 'Used by OpenAI to cache responses for similar requests to
            optimize your cache hit rates. Replaces the `user` field. [Learn more](/docs/guides/prompt-caching).

            '
          example: prompt-cache-key-1234
          type: string
        prompt_cache_retention:
          anyOf:
          - description: 'The retention policy for the prompt cache. Set to `24h`
              to enable extended prompt caching, which keeps cached prefixes active
              for longer, up to a maximum of 24 hours. [Learn more](/docs/guides/prompt-caching#prompt-cache-retention).

              '
            enum:
            - in-memory
            - 24h
            type: string
          - type: 'null'
        safety_identifier:
          description: 'A stable identifier used to help detect users of your application
            that may be violating OpenAI''s usage policies.

            The IDs should be a string that uniquely identifies each user, with a
            maximum length of 64 characters. We recommend hashing their username or
            email address, in order to avoid sending us any identifying information.
            [Learn more](/docs/guides/safety-best-practices#safety-identifiers).

            '
          example: safety-identifier-1234
          maxLength: 64
          type: string
        service_tier:
          $ref: '#/components/schemas/ServiceTier'
        temperature:
          anyOf:
          - default: 1
            description: 'What sampling temperature to use, between 0 and 2. Higher
              values like 0.8 will make the output more random, while lower values
              like 0.2 will make it more focused and deterministic.

              We generally recommend altering this or `top_p` but not both.

              '
            example: 1
            maximum: 2
            minimum: 0
            type: number
          - type: 'null'
        top_logprobs:
          anyOf:
          - description: 'An integer between 0 and 20 specifying the number of most
              likely tokens to

              return at each token position, each with an associated log probability.

              '
            maximum: 20
            minimum: 0
            type: integer
          - type: 'null'
        top_p:
          anyOf:
          - default: 1
            description: 'An alternative to sampling with temperature, called nucleus
              sampling,

              where the model considers the results of the tokens with top_p probability

              mass. So 0.1 means only the tokens comprising the top 10% probability
              mass

              are considered.


              We generally recommend altering this or `temperature` but not both.

              '
            example: 1
            maximum: 1
            minimum: 0
            type: number
          - type: 'null'
        user:
          deprecated: true
          description: 'This field is being replaced by `safety_identifier` and `prompt_cache_key`.
            Use `prompt_cache_key` instead to maintain caching optimizations.

            A stable identifier for your end-users.

            Used to boost cache hit rates by better bucketing similar requests and  to
            help OpenAI detect and prevent abuse. [Learn more](/docs/guides/safety-best-practices#safety-identifiers).

            '
          example: user-1234
          type: string
      type: object
    ParallelToolCalls:
      default: true
      description: Whether to enable [parallel function calling](/docs/guides/function-calling#configuring-parallel-function-calling)
        during tool use.
      type: boolean
    PredictionContent:
      description: 'Static predicted output content, such as the content of a text
        file that is

        being regenerated.

        '
      properties:
        content:
          description: 'The content that should be matched when generating a model
            response.

            If generated tokens would match this content, the entire model response

            can be returned much more quickly.

            '
          oneOf:
          - description: 'The content used for a Predicted Output. This is often the

              text of a file you are regenerating with minor changes.

              '
            title: Text content
            type: string
          - description: An array of content parts with a defined type. Supported
              options differ based on the [model](/docs/models) being used to generate
              the response. Can contain text inputs.
            items:
              $ref: '#/components/schemas/ChatCompletionRequestMessageContentPartText'
            minItems: 1
            title: Array of content parts
            type: array
        type:
          description: 'The type of the predicted content you want to provide. This
            type is

            currently always `content`.

            '
          enum:
          - content
          type: string
          x-stainless-const: true
      required:
      - type
      - content
      title: Static Content
      type: object
    ReasoningEffort:
      anyOf:
      - default: medium
        description: 'Constrains effort on reasoning for

          [reasoning models](https://platform.openai.com/docs/guides/reasoning).

          Currently supported values are `none`, `minimal`, `low`, `medium`, `high`,
          and `xhigh`. Reducing

          reasoning effort can result in faster responses and fewer tokens used

          on reasoning in a response.


          - `gpt-5.1` defaults to `none`, which does not perform reasoning. The supported
          reasoning values for `gpt-5.1` are `none`, `low`, `medium`, and `high`.
          Tool calls are supported for all reasoning values in gpt-5.1.

          - All models before `gpt-5.1` default to `medium` reasoning effort, and
          do not support `none`.

          - The `gpt-5-pro` model defaults to (and only supports) `high` reasoning
          effort.

          - `xhigh` is supported for all models after `gpt-5.1-codex-max`.

          '
        enum:
        - none
        - minimal
        - low
        - medium
        - high
        - xhigh
        type: string
      - type: 'null'
    ResponseFormatJsonObject:
      description: 'JSON object response format. An older method of generating JSON
        responses.

        Using `json_schema` is recommended for models that support it. Note that the

        model will not generate JSON without a system or user message instructing
        it

        to do so.

        '
      properties:
        type:
          description: The type of response format being defined. Always `json_object`.
          enum:
          - json_object
          type: string
          x-stainless-const: true
      required:
      - type
      title: JSON object
      type: object
    ResponseFormatJsonSchema:
      description: 'JSON Schema response format. Used to generate structured JSON
        responses.

        Learn more about [Structured Outputs](/docs/guides/structured-outputs).

        '
      properties:
        json_schema:
          description: 'Structured Outputs configuration options, including a JSON
            Schema.

            '
          properties:
            description:
              description: 'A description of what the response format is for, used
                by the model to

                determine how to respond in the format.

                '
              type: string
            name:
              description: 'The name of the response format. Must be a-z, A-Z, 0-9,
                or contain

                underscores and dashes, with a maximum length of 64.

                '
              type: string
            schema:
              $ref: '#/components/schemas/ResponseFormatJsonSchemaSchema'
            strict:
              anyOf:
              - default: false
                description: 'Whether to enable strict schema adherence when generating
                  the output.

                  If set to true, the model will always follow the exact schema defined

                  in the `schema` field. Only a subset of JSON Schema is supported
                  when

                  `strict` is `true`. To learn more, read the [Structured Outputs

                  guide](/docs/guides/structured-outputs).

                  '
                type: boolean
              - type: 'null'
          required:
          - name
          title: JSON schema
          type: object
        type:
          description: The type of response format being defined. Always `json_schema`.
          enum:
          - json_schema
          type: string
          x-stainless-const: true
      required:
      - type
      - json_schema
      title: JSON schema
      type: object
    ResponseFormatJsonSchemaSchema:
      additionalProperties: true
      description: 'The schema for the response format, described as a JSON Schema
        object.

        Learn how to build JSON schemas [here](https://json-schema.org/).

        '
      title: JSON schema
      type: object
    ResponseFormatText:
      description: 'Default response format. Used to generate text responses.

        '
      properties:
        type:
          description: The type of response format being defined. Always `text`.
          enum:
          - text
          type: string
          x-stainless-const: true
      required:
      - type
      title: Text
      type: object
    ResponseModalities:
      anyOf:
      - description: 'Output types that you would like the model to generate.

          Most models are capable of generating text, which is the default:


          `["text"]`


          The `gpt-4o-audio-preview` model can also be used to

          [generate audio](/docs/guides/audio). To request that this model generate

          both text and audio responses, you can use:


          `["text", "audio"]`

          '
        items:
          enum:
          - text
          - audio
          type: string
        type: array
      - type: 'null'
    ServiceTier:
      anyOf:
      - default: auto
        description: "Specifies the processing type used for serving the request.\n\
          \  - If set to 'auto', then the request will be processed with the service\
          \ tier configured in the Project settings. Unless otherwise configured,\
          \ the Project will use 'default'.\n  - If set to 'default', then the request\
          \ will be processed with the standard pricing and performance for the selected\
          \ model.\n  - If set to '[flex](/docs/guides/flex-processing)' or '[priority](https://openai.com/api-priority-processing/)',\
          \ then the request will be processed with the corresponding service tier.\n\
          \  - When not set, the default behavior is 'auto'.\n\n  When the `service_tier`\
          \ parameter is set, the response body will include the `service_tier` value\
          \ based on the processing mode actually used to serve the request. This\
          \ response value may be different from the value set in the parameter.\n"
        enum:
        - auto
        - default
        - flex
        - scale
        - priority
        type: string
      - type: 'null'
    StopConfiguration:
      default: null
      description: 'Not supported with latest reasoning models `o3` and `o4-mini`.


        Up to 4 sequences where the API will stop generating further tokens. The

        returned text will not contain the stop sequence.

        '
      nullable: true
      oneOf:
      - default: <|endoftext|>
        example: '

          '
        nullable: true
        type: string
      - items:
          example: '["\n"]'
          type: string
        maxItems: 4
        minItems: 1
        type: array
    Verbosity:
      anyOf:
      - default: medium
        description: 'Constrains the verbosity of the model''s response. Lower values
          will result in

          more concise responses, while higher values will result in more verbose
          responses.

          Currently supported values are `low`, `medium`, and `high`.

          '
        enum:
        - low
        - medium
        - high
        type: string
      - type: 'null'
    VoiceIdsOrCustomVoice:
      anyOf:
      - $ref: '#/components/schemas/VoiceIdsShared'
      - additionalProperties: false
        description: Custom voice reference.
        properties:
          id:
            description: The custom voice ID, e.g. `voice_1234`.
            example: voice_1234
            type: string
        required:
        - id
        type: object
      description: 'A built-in voice name or a custom voice reference.

        '
      title: Voice
    VoiceIdsShared:
      anyOf:
      - type: string
      - enum:
        - alloy
        - ash
        - ballad
        - coral
        - echo
        - sage
        - shimmer
        - verse
        - marin
        - cedar
        type: string
      example: ash
    WebSearchContextSize:
      default: medium
      description: "High level guidance for the amount of context window space to\
        \ use for the \nsearch. One of `low`, `medium`, or `high`. `medium` is the\
        \ default.\n"
      enum:
      - low
      - medium
      - high
      type: string
    WebSearchLocation:
      description: Approximate location parameters for the search.
      properties:
        city:
          description: 'Free text input for the city of the user, e.g. `San Francisco`.

            '
          type: string
        country:
          description: "The two-letter \n[ISO country code](https://en.wikipedia.org/wiki/ISO_3166-1)\
            \ of the user,\ne.g. `US`.\n"
          type: string
        region:
          description: 'Free text input for the region of the user, e.g. `California`.

            '
          type: string
        timezone:
          description: "The [IANA timezone](https://timeapi.io/documentation/iana-timezones)\
            \ \nof the user, e.g. `America/Los_Angeles`.\n"
          type: string
      title: Web search location
      type: object
