                - wav
                - aac
                - mp3
                - flac
                - opus
                - pcm16
                type: string
              voice:
                $ref: '#/components/schemas/VoiceIdsOrCustomVoice'
                description: 'The voice the model uses to respond. Supported built-in
                  voices are

                  `alloy`, `ash`, `ballad`, `coral`, `echo`, `fable`, `nova`, `onyx`,

                  `sage`, `shimmer`, `marin`, and `cedar`. You may also provide a

                  custom voice object with an `id`, for example `{ "id": "voice_1234"
                  }`.

